{% extends "base.html" %}

{# Doubles as the "new reading" form (prefilled from `latest`) and the edit
   form (set `reading`, `form_title`, and `form_action` in the context). #}
{% set prefill = reading or latest %}

{% block content %}
<section>
  <h1>{{ form_title or "New Reading" }}</h1>
  <form method="post" action="{{ form_action or '/readings/new' }}" class="form-card">
    <label>Tested at
      <input name="tested_at" type="datetime-local" value="{{ reading.tested_at_local[:16] if reading and reading.tested_at_local else '' }}">
    </label>
    <div class="form-grid">
      <label>FC
        <input name="fc" inputmode="decimal" value="{{ prefill.fc | num(false) if prefill else '' }}">
        <small>ppm</small>
      </label>
      <label>CC
        <input name="cc" inputmode="decimal" value="{{ prefill.cc | num(false) if prefill else '' }}">
        <small>ppm</small>
      </label>
      <label>pH
        <input name="ph" inputmode="decimal" value="{{ prefill.ph | num(false) if prefill else '' }}">
      </label>
      <label>TA
        <input name="ta" inputmode="decimal" value="{{ prefill.ta | num(false) if prefill else '' }}">
        <small>ppm</small>
      </label>
      <label>CH
        <input name="ch" inputmode="decimal" value="{{ prefill.ch | num(false) if prefill else '' }}">
        <small>ppm</small>
      </label>
      <label>CYA
        <input name="cya" inputmode="decimal" value="{{ prefill.cya | num(false) if prefill else '' }}">
        <small>ppm</small>
      </label>
      <label>Salt
        <input name="salt" inputmode="decimal" value="{{ prefill.salt | num(false) if prefill else '' }}">
        <small>ppm</small>
      </label>
      <label>Borates
        <input name="borates" inputmode="decimal" value="{{ prefill.borates | num(false) if prefill else '' }}">
        <small>ppm</small>
      </label>
      <label>Water temp
        <input name="water_temp_f" inputmode="decimal" value="{{ prefill.water_temp_f | num(false) if prefill else '' }}">
        <small>deg F</small>
      </label>
      <label>Filter pressure
        <input name="filter_pressure" inputmode="decimal" value="{{ prefill.filter_pressure | num(false) if prefill else '' }}">
        <small>psi</small>
      </label>
    </div>
    <label>Notes
      <textarea name="notes" rows="3">{{ reading.notes if reading and reading.notes else '' }}</textarea>
    </label>
    <button class="button primary" type="submit">Save reading</button>
  </form>
</section>
{% endblock %}
