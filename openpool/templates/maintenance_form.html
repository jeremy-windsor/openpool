{% extends "base.html" %}

{# Doubles as the "new maintenance" form and the edit form (set `event`,
   `form_title`, and `form_action` in the context). #}

{% block content %}
<section>
  <h1>{{ form_title or "Log Maintenance" }}</h1>
  <form method="post" action="{{ form_action or '/maintenance/new' }}" class="form-card">
    <label>When
      <input name="event_at" type="datetime-local" value="{{ event.event_at_local[:16] if event and event.event_at_local else '' }}">
    </label>
    <label>What was done
      <select name="event_type">
        {% for value, label in [
          ("backwash", "Backwash filter"),
          ("clean_filter", "Clean filter"),
          ("brush", "Brush walls"),
          ("vacuum", "Vacuum"),
          ("skim", "Skim / empty baskets"),
          ("clean_cell", "Clean SWG cell"),
          ("water_refill", "Add / replace water"),
          ("equipment", "Equipment service"),
          ("other", "Other"),
        ] %}
        <option value="{{ value }}" {% if event and event.event_type == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Notes
      <textarea name="notes" rows="3">{{ event.notes if event and event.notes else '' }}</textarea>
    </label>
    <button class="button primary" type="submit">Save maintenance</button>
  </form>
</section>
{% endblock %}
