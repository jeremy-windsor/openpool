{% extends "base.html" %}

{% block content %}
<section>
  <h1>Settings</h1>
  <form method="post" action="/settings" class="form-card">
    <label>Pool name
      <input name="name" value="{{ pool.name }}">
    </label>
    <label>Volume
      <input name="volume_gallons" inputmode="decimal" value="{{ pool.volume_gallons | num(false) }}">
      <small>gallons</small>
    </label>
    <label>Surface
      <input name="surface" value="{{ pool.surface }}">
    </label>
    <label>Sanitizer
      <select name="sanitizer">
        <option value="liquid_chlorine" {% if pool.sanitizer == "liquid_chlorine" %}selected{% endif %}>Liquid chlorine</option>
        <option value="swg" {% if pool.sanitizer == "swg" %}selected{% endif %}>Salt water generator</option>
      </select>
    </label>
    <label>Timezone
      <input name="timezone" value="{{ pool.timezone }}">
    </label>
    <label>Default chlorine strength
      <input name="default_chlorine_percent" inputmode="decimal" value="{{ pool.default_chlorine_percent | num(false) }}">
      <small>percent</small>
    </label>
    <label>Jug size
      <input name="jug_size_fl_oz" inputmode="decimal" value="{{ pool.jug_size_fl_oz | num(false) }}">
      <small>fl oz</small>
    </label>
    <label>Salt bag size
      <input name="bag_size_lbs" inputmode="decimal" value="{{ pool.bag_size_lbs | num(false) }}">
      <small>lb</small>
    </label>
    <input name="share_enabled" type="hidden" value="0">
    <label class="checkbox-row">
      <input name="share_enabled" type="checkbox" value="1" {% if pool.share_enabled %}checked{% endif %}>
      Enable read-only share endpoint
    </label>
    <label>Share token
      <input name="share_token" value="{{ pool.share_token or '' }}">
    </label>
    <button class="button primary" type="submit">Save settings</button>
  </form>
</section>
{% endblock %}
